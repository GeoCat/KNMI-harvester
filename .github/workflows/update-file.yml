name: Periodic File Update

on:
  schedule:
    # Runs at 00:00 UTC every day. 
    # Change the cron syntax to adjust the frequency.
    - cron: '0 0 * * *'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Python script
        run: python harvester.py

      - name: Commit and push changes
        run: |
          # Configure Git to use the GitHub Actions bot identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check if there are any changes to commit
          if git diff --exit-code; then
            echo "No changes detected. Skipping commit."
          else
            git add data.txt  # Replace with the file(s) your script modifies, or use `git add .`
            git commit -m "Automated update from Python script"
            git push
          fi